<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>신혼집 가전·가구 배치 플래너</title>
<style>
  :root{
    --bg:#f4f1ec; --panel:#ffffff; --ink:#2c2a26; --sub:#6b665d;
    --line:#d9d3c7; --accent:#c2703d;
    --ok:#2e9e5b; --bad:#e0483b; --warn:#e0972f;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:var(--bg);color:var(--ink);
    display:flex;flex-direction:column;height:100dvh;overflow:hidden;
    -webkit-user-select:none;user-select:none;
  }
  header{flex:0 0 auto;background:var(--panel);border-bottom:1px solid var(--line);padding:env(safe-area-inset-top) 10px 0;}
  .titlerow{display:flex;align-items:center;gap:8px;padding:8px 2px 6px}
  .titlerow h1{font-size:15px;margin:0;font-weight:700;flex:1;letter-spacing:-.3px}
  #badge{font-size:12px;font-weight:700;padding:5px 10px;border-radius:999px;background:#eef6f0;color:var(--ok);white-space:nowrap;}
  #badge.has-bad{background:#fdecea;color:var(--bad)}
  .toolrow{display:flex;gap:6px;align-items:center;padding:0 0 8px;flex-wrap:wrap}
  .seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{border:0;background:var(--panel);color:var(--sub);font-size:12px;font-weight:600;padding:7px 11px;min-width:46px;font-family:inherit;}
  .seg button.active{background:var(--accent);color:#fff}
  .toolrow .label{font-size:11px;color:var(--sub)}
  .ghost{border:1px solid var(--line);background:var(--panel);color:var(--ink);font-size:12px;font-weight:600;padding:7px 10px;border-radius:9px;font-family:inherit;}
  .ghost:active{background:#f0ece4}
  .spacer{flex:1}
  #stage{flex:1 1 auto;position:relative;overflow:hidden;background:#fbf9f5}
  #plan{width:100%;height:100%;display:block;touch-action:none}
  text{user-select:none}
  #sheet{position:absolute;left:0;right:0;bottom:0;transform:translateY(110%);
    transition:transform .22s cubic-bezier(.2,.8,.3,1);background:var(--panel);
    border-top:1px solid var(--line);border-radius:16px 16px 0 0;box-shadow:0 -8px 24px rgba(0,0,0,.12);
    padding:10px 14px calc(14px + env(safe-area-inset-bottom));z-index:5;}
  #sheet.open{transform:translateY(0)}
  .sheet-grip{width:38px;height:4px;border-radius:3px;background:var(--line);margin:2px auto 10px}
  .sheet-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .sheet-head .nm{font-size:16px;font-weight:700;flex:1}
  .chip{font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px}
  .chip.ok{background:#eef6f0;color:var(--ok)}
  .chip.bad{background:#fdecea;color:var(--bad)}
  .chip.warn{background:#fbf1e0;color:var(--warn)}
  .chip.fixed{background:#eef0f3;color:var(--sub)}
  .meta{font-size:12px;color:var(--sub);margin:2px 0 10px}
  .meta b{color:var(--ink)}
  .dimrow{display:flex;gap:8px;margin-bottom:10px}
  .dimrow .f{flex:1;display:flex;flex-direction:column;gap:3px}
  .dimrow label{font-size:11px;color:var(--sub);font-weight:600}
  .dimrow input{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 8px;font-size:15px;font-family:inherit;text-align:center;color:var(--ink);background:#faf7f2;}
  .dimrow input:focus{outline:2px solid var(--accent);border-color:transparent}
  .actrow{display:flex;gap:8px}
  .actrow button{flex:1;border:0;border-radius:10px;padding:11px;font-size:13px;font-weight:700;font-family:inherit;background:#f0ece4;color:var(--ink);}
  .actrow button.primary{background:var(--accent);color:#fff}
  .actrow button:active{filter:brightness(.95)}
  .note{font-size:11px;color:var(--sub);margin:8px 0 2px;line-height:1.45}
  #toast{position:absolute;left:50%;bottom:18px;transform:translate(-50%,20px);background:#2c2a26;color:#fff;
    font-size:12.5px;font-weight:600;padding:9px 15px;border-radius:999px;opacity:0;pointer-events:none;transition:.2s;z-index:9;white-space:nowrap;}
  #toast.show{opacity:1;transform:translate(-50%,0)}
  .hint{position:absolute;left:50%;top:8px;transform:translateX(-50%);font-size:11px;color:var(--sub);
    background:rgba(255,255,255,.88);padding:5px 12px;border-radius:999px;pointer-events:none;}
</style>
</head>
<body>
<header>
  <div class="titlerow">
    <h1>신혼집 배치 플래너</h1>
    <span id="badge">충돌 0</span>
  </div>
  <div class="toolrow">
    <span class="label">핏체크</span>
    <div class="seg" id="modeSeg">
      <button data-mode="simple">간단</button>
      <button data-mode="standard" class="active">표준</button>
      <button data-mode="strict">엄격</button>
    </div>
    <div class="spacer"></div>
    <button class="ghost" id="shareBtn">공유</button>
    <button class="ghost" id="resetBtn">초기화</button>
  </div>
</header>

<div id="stage">
  <div class="hint" id="hint">물품을 탭하면 치수·핏, 드래그로 이동</div>
  <svg id="plan" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 750" preserveAspectRatio="xMidYMid meet"></svg>
  <div id="toast"></div>

  <div id="sheet">
    <div class="sheet-grip"></div>
    <div class="sheet-head">
      <span class="nm" id="sNm">—</span>
      <span class="chip" id="sChip">—</span>
    </div>
    <div class="meta" id="sMeta"></div>
    <div class="dimrow" id="sDims">
      <div class="f"><label>가로 W (mm)</label><input id="iW" type="number" inputmode="numeric" min="1"></div>
      <div class="f"><label>세로 D (mm)</label><input id="iD" type="number" inputmode="numeric" min="1"></div>
      <div class="f"><label>높이 H (mm)</label><input id="iH" type="number" inputmode="numeric" min="1"></div>
    </div>
    <div class="actrow" id="sActs">
      <button id="rotBtn">90° 회전</button>
      <button id="recBtn">권장값</button>
      <button class="primary" id="closeBtn">닫기</button>
    </div>
    <div class="note" id="sNote"></div>
  </div>
</div>

<script>
(function(){
"use strict";

/* =========================================================
   좌표계: 배경 = 사용자가 제공한 원본 평면도(1024×750px).
   SVG viewBox = 이미지 픽셀. 가구는 이 픽셀 공간에 얹는다.
   S = 실측 mm → 화면 px 환산 스케일 (거실 폭 4700mm ≈ 230px 로 보정).
   ========================================================= */
const IMG_W = 1024, IMG_H = 750;
const S = 0.0489;                 // px per mm
const mm2px = mm => mm * S;

/* 방(구역) 픽셀 사각형 — 원본 평면도 위 위치에 맞춤(핏체크 영역) */
const ZONES = {
  kitchen : {x:470, y:150, w:130, h:214, label:"주방 및 식당"},
  master  : {x:624, y:156, w:120, h:108, label:"안방(침실)"},
  living  : {x:410, y:366, w:234, h:234, label:"거실"},
  kbalcony: {x:448, y:84,  w:136, h:56,  label:"주방측 발코니"},
  dress   : {x:724, y:296, w:76,  h:56,  label:"드레스룸"},
  balconyL: {x:224, y:600, w:166, h:70,  label:"발코니/세탁실"},
};

/* 배치 물품 (PRD 5장). cur.w/d/h = mm, cur.x/y = px(좌상단), rot = 0/90/180/270 */
const DEFAULTS = [
  {id:"fridge", name:"냉장고", category:"가전", zone:"kitchen",
   rec:{w:916,d:913,h:1853}, max:{w:1000,d:900,h:2000},
   cur:{w:916,d:913,h:1853,x:520,y:165,rot:0}, note:"4도어 권장. 문 앞 여유 700 이상 확보."},
  {id:"tv", name:"TV", category:"가전", zone:"living",
   rec:{w:1930,d:60,h:1110}, max:{w:2200,d:300,h:1260},
   cur:{w:1930,d:60,h:1110,x:480,y:372,rot:0}, note:"86″ 벽걸이 기준. 거실 TV벽 폭 4700."},
  {id:"washer", name:"세탁건조기", category:"가전", zone:"kbalcony",
   rec:{w:600,d:950,h:980}, max:{w:700,d:1000,h:1050},
   cur:{w:600,d:950,h:980,x:470,y:88,rot:0}, note:"일체형 드럼. 급·배수 라인 위치 확인."},
  {id:"styler", name:"스타일러", category:"가전", zone:"dress",
   rec:{w:555,d:585,h:1850}, max:{w:690,d:585,h:1850},
   cur:{w:555,d:585,h:1850,x:736,y:308,rot:0}, note:"드레스룸/전실 측. 문 열림 방향 확인."},
  {id:"sofa", name:"소파", category:"가구", zone:"living",
   rec:{w:2800,d:1000,h:900}, max:{w:4000,d:1100,h:1000},
   cur:{w:2800,d:1000,h:900,x:459,y:538,rot:0}, note:"3.5~4인. TV와 시청거리 확보."},
  {id:"bed", name:"침대", category:"가구", zone:"master",
   rec:{w:1800,d:2000,h:1200}, max:{w:2000,d:2200,h:1200},
   cur:{w:1800,d:2000,h:1200,x:636,y:162,rot:0}, note:"LK 기준(높이=헤드보드). 양옆 통로 확보."},
  {id:"tvstand", name:"TV장", category:"가구", zone:"living",
   rec:{w:2000,d:450,h:450}, max:{w:4200,d:450,h:600},
   cur:{w:2000,d:450,h:450,x:478,y:378,rot:0}, note:"로우보드. TV벽 하단 배치."},
];

/* 고정 마커 (크기 무관, 계산 제외) — w/h 는 px */
const MARKERS = [
  {id:"dishwasher", name:"식기세척기", zone:"kitchen", x:476, y:296, w:29, h:29,
   note:"빌트인 600×600×820. 하부장 폭 600 고정, 6/12인용 선택."},
  {id:"foodwaste", name:"음식물 처리기", zone:"kitchen", x:479, y:278, w:15, h:15,
   note:"직배수·소형 300×300×450. 공간 영향 미미."},
  {id:"robot", name:"로봇청소기", zone:"balconyL", x:240, y:615, w:17, h:22,
   note:"본체 Ø350 / 스테이션 350×450×500. 크기보다 급·배수 배관 위치가 중요."},
];

const CLEARANCE_MM = 600;                 // 엄격 모드 통로 이격
const CLEARANCE = mm2px(CLEARANCE_MM);    // px

/* ---------- 상태 ---------- */
let items=[], mode="standard", selId=null;
const clone=o=>JSON.parse(JSON.stringify(o));
const makeDefaults=()=>DEFAULTS.map(clone);
const byId=id=>items.find(i=>i.id===id);

/* 회전 반영 px footprint */
function footprint(it){
  const rot=((it.cur.rot%360)+360)%360, swap=(rot===90||rot===270);
  const w=mm2px(it.cur.w), d=mm2px(it.cur.d);
  return {x:it.cur.x, y:it.cur.y, w:swap?d:w, h:swap?w:d};
}
const rectInside=(r,z)=>r.x>=z.x&&r.y>=z.y&&(r.x+r.w)<=(z.x+z.w)&&(r.y+r.h)<=(z.y+z.h);
const overlap=(a,b)=>a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;

function fitStatus(it){
  const f=footprint(it), z=ZONES[it.zone], inZone=rectInside(f,z);
  if(mode==="simple") return inZone?"ok":"bad";
  const hitItem=items.some(o=>o!==it&&overlap(f,footprint(o)));
  if(!inZone||hitItem) return "bad";
  if(mode==="strict"){
    const e={x:f.x-CLEARANCE,y:f.y-CLEARANCE,w:f.w+2*CLEARANCE,h:f.h+2*CLEARANCE};
    if(items.some(o=>o!==it&&overlap(e,footprint(o)))) return "warn";
  }
  return "ok";
}
const STATUS_COLOR={ok:"var(--ok)",bad:"var(--bad)",warn:"var(--warn)"};
const STATUS_KO={ok:"여유 OK",bad:"충돌",warn:"근접 경고",fixed:"고정"};

/* ---------- 렌더링 ---------- */
const svg=document.getElementById("plan");
const SVGNS="http://www.w3.org/2000/svg";
const el=(t,a)=>{const e=document.createElementNS(SVGNS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};

function renderStatic(){
  let g=svg.querySelector("#bg"); if(g) g.remove();
  g=el("g",{id:"bg"});
  g.appendChild(el("image",{x:0,y:0,width:IMG_W,height:IMG_H,
    href:BG_IMG, "preserveAspectRatio":"none"}));
  MARKERS.forEach(m=>{
    const grp=el("g",{"data-id":m.id,style:"cursor:pointer"});
    grp.appendChild(el("circle",{cx:m.x+m.w/2,cy:m.y+m.h/2,r:Math.max(m.w,m.h)/2+3,
      fill:"rgba(255,255,255,.7)",stroke:"#8a7e66","stroke-width":1.4,"stroke-dasharray":"3 2.4"}));
    const t=el("text",{x:m.x+m.w/2,y:m.y+m.h/2,"text-anchor":"middle","dominant-baseline":"central","font-size":8,fill:"#7a6f5c","font-weight":"700"});
    t.textContent="◍"; grp.appendChild(t);
    g.appendChild(grp);
  });
  svg.appendChild(g);
}

function renderItems(){
  let g=svg.querySelector("#itemLayer"); if(g) g.remove();
  g=el("g",{id:"itemLayer"});
  items.forEach(it=>{
    const f=footprint(it), st=fitStatus(it), col=STATUS_COLOR[st], sel=(it.id===selId);
    if(mode==="strict"){
      g.appendChild(el("rect",{x:f.x-CLEARANCE,y:f.y-CLEARANCE,width:f.w+2*CLEARANCE,height:f.h+2*CLEARANCE,
        rx:2,fill:"none",stroke:col,"stroke-width":1,"stroke-dasharray":"6 4.5",opacity:.55}));
    }
    const grp=el("g",{"data-id":it.id,style:"cursor:grab"});
    grp.appendChild(el("rect",{x:f.x,y:f.y,width:f.w,height:f.h,rx:2,
      fill:fillFor(it.category,st),stroke:col,"stroke-width":sel?2.4:1.6}));
    if(sel){
      grp.appendChild(el("rect",{x:f.x-2.5,y:f.y-2.5,width:f.w+5,height:f.h+5,rx:3,
        fill:"none",stroke:"var(--accent)","stroke-width":1,"stroke-dasharray":"4.5 3.5"}));
    }
    const fs=Math.max(7,Math.min(13,Math.min(f.w,f.h)*0.42));
    const t=el("text",{x:f.x+f.w/2,y:f.y+f.h/2,"text-anchor":"middle","dominant-baseline":"central",
      "font-size":fs,fill:"#26201a","font-weight":"700","paint-order":"stroke","stroke":"rgba(255,255,255,.85)","stroke-width":fs*0.22});
    t.textContent=it.name; grp.appendChild(t);
    g.appendChild(grp);
  });
  svg.appendChild(g);
}
function fillFor(cat,st){
  if(st==="bad") return "rgba(224,72,59,.34)";
  if(st==="warn") return "rgba(224,151,47,.36)";
  return cat==="가전" ? "rgba(86,134,196,.5)" : "rgba(96,168,104,.52)";
}

/* ---------- 드래그/탭 ---------- */
let dragId=null, dragStart=null, dragMoved=false;
function toSvg(evt){const pt=svg.createSVGPoint();pt.x=evt.clientX;pt.y=evt.clientY;return pt.matrixTransform(svg.getScreenCTM().inverse());}
function pxThreshold(){const r=svg.getBoundingClientRect();return 6*(svg.viewBox.baseVal.width/r.width);}

svg.addEventListener("pointerdown", e=>{
  const grp=e.target.closest("[data-id]");
  dragMoved=false;
  const p=toSvg(e);
  if(!grp){ dragId="__empty__"; dragStart={px:p.x,py:p.y}; return; }
  const id=grp.dataset.id; dragId=id;
  const it=byId(id);
  dragStart={px:p.x,py:p.y,ix:it?it.cur.x:0,iy:it?it.cur.y:0};
  if(it){ selId=id; renderItems(); }
  try{svg.setPointerCapture(e.pointerId);}catch(_){}
});
svg.addEventListener("pointermove", e=>{
  if(!dragId) return;
  const it=byId(dragId), p=toSvg(e);
  if(it){
    const dx=p.x-dragStart.px, dy=p.y-dragStart.py;
    if(Math.hypot(dx,dy)>pxThreshold()) dragMoved=true;
    it.cur.x=Math.round((dragStart.ix+dx)*10)/10;
    it.cur.y=Math.round((dragStart.iy+dy)*10)/10;
    renderItems();
  }else if(dragStart){
    if(Math.hypot(p.x-dragStart.px,p.y-dragStart.py)>pxThreshold()) dragMoved=true;
  }
});
svg.addEventListener("pointerup", e=>{
  if(!dragId) return;
  try{svg.releasePointerCapture(e.pointerId);}catch(_){}
  const id=dragId; dragId=null;
  if(id==="__empty__"){ if(!dragMoved){selId=null;closeSheet();renderItems();} return; }
  const it=byId(id);
  if(it){ if(!dragMoved) openSheet(it.id); else {clampToBounds(it);renderItems();updateBadge();syncHash();} }
  else if(!dragMoved){ openMarker(id); }
});
svg.addEventListener("pointercancel", ()=>{dragId=null;});

function clampToBounds(it){
  const f=footprint(it), pad=20;
  let nx=it.cur.x, ny=it.cur.y;
  if(f.x<-pad) nx+=(-pad-f.x);
  if(f.y<-pad) ny+=(-pad-f.y);
  if(f.x+f.w>IMG_W+pad) nx-=(f.x+f.w-IMG_W-pad);
  if(f.y+f.h>IMG_H+pad) ny-=(f.y+f.h-IMG_H-pad);
  it.cur.x=Math.round(nx*10)/10; it.cur.y=Math.round(ny*10)/10;
}

/* ---------- 디테일 시트 ---------- */
const sheet=document.getElementById("sheet");
const sNm=document.getElementById("sNm"),sChip=document.getElementById("sChip");
const sMeta=document.getElementById("sMeta"),sNote=document.getElementById("sNote");
const iW=document.getElementById("iW"),iD=document.getElementById("iD"),iH=document.getElementById("iH");
const sDims=document.getElementById("sDims"),sActs=document.getElementById("sActs");

function openSheet(id){
  selId=id; const it=byId(id); if(!it) return;
  renderItems();
  const st=fitStatus(it);
  sNm.textContent=it.name; sChip.textContent=STATUS_KO[st]; sChip.className="chip "+st;
  const z=ZONES[it.zone];
  sMeta.innerHTML=`구분 <b>${it.category}</b> · 배치영역 <b>${z.label}</b> · 권장 <b>${it.rec.w}×${it.rec.d}×${it.rec.h}</b> mm`;
  iW.value=it.cur.w; iD.value=it.cur.d; iH.value=it.cur.h;
  iW.disabled=iD.disabled=iH.disabled=false;
  sDims.style.display="flex"; sActs.style.display="flex";
  sNote.textContent="ℹ︎ "+it.note;
  sheet.classList.add("open");
}
function openMarker(id){
  const m=MARKERS.find(x=>x.id===id); if(!m) return;
  selId=null; renderItems();
  sNm.textContent=m.name+" (고정)"; sChip.textContent=STATUS_KO.fixed; sChip.className="chip fixed";
  sMeta.innerHTML=`배치영역 <b>${ZONES[m.zone].label}</b> · 크기 계산 제외 마커`;
  sDims.style.display="none"; sActs.style.display="none";
  sNote.textContent="ℹ︎ "+m.note;
  sheet.classList.add("open");
}
function closeSheet(){ sheet.classList.remove("open"); }

document.getElementById("closeBtn").onclick=()=>{closeSheet();selId=null;renderItems();};
document.getElementById("rotBtn").onclick=()=>{const it=byId(selId);if(!it)return;it.cur.rot=(it.cur.rot+90)%360;clampToBounds(it);refreshSelected();};
document.getElementById("recBtn").onclick=()=>{const it=byId(selId);if(!it)return;it.cur.w=it.rec.w;it.cur.d=it.rec.d;it.cur.h=it.rec.h;it.cur.rot=0;refreshSelected();};
function applyDim(){
  const it=byId(selId); if(!it) return;
  const w=parseInt(iW.value,10),d=parseInt(iD.value,10),h=parseInt(iH.value,10);
  if(w>0) it.cur.w=w; if(d>0) it.cur.d=d; if(h>0) it.cur.h=h;
  refreshSelected(false);
}
iW.addEventListener("input",applyDim); iD.addEventListener("input",applyDim); iH.addEventListener("input",applyDim);
function refreshSelected(reopen=true){
  const it=byId(selId); clampToBounds(it);
  renderItems(); updateBadge(); syncHash();
  if(it){const st=fitStatus(it);sChip.textContent=STATUS_KO[st];sChip.className="chip "+st;
    if(reopen){iW.value=it.cur.w;iD.value=it.cur.d;iH.value=it.cur.h;}}
}

/* ---------- 모드/배지/버튼 ---------- */
const modeSeg=document.getElementById("modeSeg");
modeSeg.addEventListener("click", e=>{
  const b=e.target.closest("button"); if(!b) return;
  mode=b.dataset.mode;
  [...modeSeg.children].forEach(c=>c.classList.toggle("active",c===b));
  renderItems(); updateBadge(); syncHash();
  if(selId){const it=byId(selId),st=fitStatus(it);sChip.textContent=STATUS_KO[st];sChip.className="chip "+st;}
});
const badge=document.getElementById("badge");
function updateBadge(){
  const total=items.length;
  const bad=items.filter(i=>fitStatus(i)==="bad").length;
  const warn=items.filter(i=>fitStatus(i)==="warn").length;
  badge.classList.toggle("has-bad",bad>0);
  badge.textContent = bad>0 ? `${total}개 중 ${bad}개 충돌` : (warn>0?`근접 경고 ${warn}`:`충돌 0`);
}
document.getElementById("resetBtn").onclick=()=>{
  items=makeDefaults(); selId=null; mode="standard";
  [...modeSeg.children].forEach(c=>c.classList.toggle("active",c.dataset.mode==="standard"));
  closeSheet(); history.replaceState(null,"",location.pathname+location.search);
  renderItems(); updateBadge(); toast("기본 배치로 초기화했어요");
};
document.getElementById("shareBtn").onclick=()=>{
  syncHash();
  if(navigator.clipboard&&navigator.clipboard.writeText)
    navigator.clipboard.writeText(location.href).then(()=>toast("배치 링크를 복사했어요"),()=>toast("주소창의 링크를 복사하세요"));
  else toast("주소창의 링크를 복사하세요");
};
let toastTimer; const toastEl=document.getElementById("toast");
function toast(msg){toastEl.textContent=msg;toastEl.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>toastEl.classList.remove("show"),1900);}

/* ---------- URL 해시 ---------- */
function syncHash(){
  const M={simple:"a",standard:"b",strict:"c"}[mode];
  const parts=items.map(i=>`${i.id}:${i.cur.w},${i.cur.d},${i.cur.h},${i.cur.x},${i.cur.y},${i.cur.rot}`);
  history.replaceState(null,"",location.pathname+location.search+`#s=${M};${parts.join("|")}`);
}
function loadHash(){
  const h=location.hash; if(!h.startsWith("#s=")) return false;
  try{
    const [mPart,rest]=decodeURIComponent(h.slice(3)).split(";");
    mode={a:"simple",b:"standard",c:"strict"}[mPart]||"standard";
    (rest||"").split("|").forEach(seg=>{
      const [id,vals]=seg.split(":"); if(!id||!vals) return;
      const it=byId(id); if(!it) return;
      const n=vals.split(",").map(Number); if(n.some(v=>Number.isNaN(v))) return;
      let w,d,hh,x,y,r;
      if(n.length>=6){[w,d,hh,x,y,r]=n;} else {[w,d,x,y,r]=n;hh=it.cur.h;}
      it.cur={w,d,h:hh,x,y,rot:((r%360)+360)%360};
    });
    [...modeSeg.children].forEach(c=>c.classList.toggle("active",c.dataset.mode===mode));
    return true;
  }catch(_){return false;}
}

/* ---------- init ---------- */
function init(){
  items=makeDefaults();
  loadHash();
  renderStatic(); renderItems(); updateBadge();
  setTimeout(()=>{const hn=document.getElementById("hint");if(hn){hn.style.transition="opacity .6s";hn.style.opacity="0";}},3500);
}
