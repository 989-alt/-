<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>윷놀이 게임</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Jua', sans-serif;
            touch-action: manipulation;
        }
        
        /* 3D 효과를 위한 원근감 설정 */
        #yut-container {
            perspective: 1200px;
        }

        /* 윷 하나하나를 감싸는 컨테이너, 던지는 애니메이션 적용 */
        .yut-wrapper {
            position: absolute;
            transition: transform 1s cubic-bezier(0.2, 0.9, 0.5, 1);
        }
        
        /* 윷의 3D 모델 */
        .yut-stick {
            width: 40px;
            height: 160px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1s cubic-bezier(0.2, 0.9, 0.5, 1);
        }

        /* 윷의 앞면과 뒷면 공통 스타일 */
        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            border: 2px solid #855b3b;
        }

        /* 윷의 등 (흰색, 직사각형 모양) */
        .face.back {
            background-color: #ffffff; /* 흰색 */
            border-radius: 4px;
            transform: translateZ(8px);
        }
        
        /* 윷의 배 (갈색, 둥근 모서리, X 표시) */
        .face.belly {
            background-color: #d2b48c; /* 갈색/베이지색 */
            border-radius: 20px;
            transform: rotateY(180deg) translateZ(8px);
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            font-size: 1.2rem;
            color: #855b3b;
            font-weight: bold;
        }

        .throw-button {
            transition: all 0.2s ease-in-out;
        }
        .throw-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .throw-button:active {
            transform: translateY(1px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        #result-display {
             text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="bg-[#fdf6e3] flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md mx-auto bg-white/50 backdrop-blur-sm p-6 sm:p-8 rounded-2xl shadow-2xl text-center border-4 border-[#A0522D]/50">
        
        <h1 class="text-4xl sm:text-5xl font-bold text-[#A0522D] mb-4">신나는 윷놀이!</h1>
        <p class="text-gray-600 mb-6">아래 버튼을 눌러 윷을 던져보세요.</p>
        
        <!-- Yut sticks display area -->
        <div id="yut-container" class="relative flex justify-center items-center h-48 mb-6">
            <!-- Sticks will be generated by JS -->
        </div>
        
        <!-- Result display area -->
        <div id="result-display" class="h-24 flex flex-col items-center justify-center">
            <p id="result-text" class="text-6xl sm:text-7xl font-bold text-amber-600"></p>
            <p id="result-description" class="text-lg text-gray-700 mt-1"></p>
        </div>
        
        <!-- Throw button -->
        <button id="throw-button" class="throw-button w-full bg-[#A0522D] text-white text-xl sm:text-2xl font-bold py-4 px-6 rounded-xl shadow-lg mt-6 focus:outline-none focus:ring-4 focus:ring-amber-500/50">
            윷 던지기
        </button>

    </div>

    <script>
        const throwButton = document.getElementById('throw-button');
        const yutContainer = document.getElementById('yut-container');
        const resultText = document.getElementById('result-text');
        const resultDescription = document.getElementById('result-description');

        const results = {
            0: { name: '윷', description: '등 4개' }, // Yut
            1: { name: '도', description: '배 1개, 등 3개' }, // Do
            2: { name: '개', description: '배 2개, 등 2개' }, // Gae
            3: { name: '걸', description: '배 3개, 등 1개' }, // Geol
            4: { name: '모', description: '배 4개' }  // Mo
        };
        
        // 초기 메시지 설정
        function setInitialMessage() {
            yutContainer.innerHTML = ''; // 이전 윷가락 지우기
             resultText.textContent = "준비!";
             resultDescription.textContent = "버튼을 눌러 시작하세요";
        }

        function throwYut() {
            throwButton.disabled = true;
            throwButton.textContent = '휙~ 던지는 중!';
            throwButton.classList.add('opacity-50', 'cursor-not-allowed');

            resultText.textContent = '';
            resultDescription.textContent = '';
            yutContainer.innerHTML = '';
            
            let bellyCount = 0;
            const stickElements = [];

            for (let i = 0; i < 4; i++) {
                const isBelly = Math.random() > 0.5;
                if (isBelly) {
                    bellyCount++;
                }

                // 윷 DOM 요소 생성
                const wrapper = document.createElement('div');
                wrapper.className = 'yut-wrapper';

                const stick = document.createElement('div');
                stick.className = 'yut-stick';

                const back = document.createElement('div');
                back.className = 'face back';

                const belly = document.createElement('div');
                belly.className = 'face belly';
                belly.innerHTML = '<span>X</span><span>X</span>';

                stick.appendChild(back);
                stick.appendChild(belly);
                wrapper.appendChild(stick);
                yutContainer.appendChild(wrapper);

                // 애니메이션을 위한 초기 상태 설정
                wrapper.style.transform = `translateY(-200px) rotateZ(${Math.random() * 360}deg)`;
                stick.style.transform = `rotateY(${Math.random() * 360}deg) rotateX(${Math.random() * 360}deg)`;
                
                stickElements.push({ wrapper, stick, isBelly });
            }

            // 짧은 지연 후 애니메이션 시작 (브라우저가 초기 상태를 렌더링할 시간을 줌)
            setTimeout(() => {
                stickElements.forEach((el, i) => {
                    const finalX = (i - 1.5) * 50 + (Math.random() - 0.5) * 15;
                    const finalZRotation = (Math.random() - 0.5) * 20;
                    
                    // 윷이 바닥에 떨어지는 움직임
                    el.wrapper.style.transform = `translateX(${finalX}px) rotateZ(${finalZRotation}deg)`;
                    
                    // 윷이 빙글빙글 돌면서 앞/뒤를 결정
                    const yRotation = (el.isBelly ? 180 : 0) + 360 * (Math.floor(Math.random() * 2) + 2); // 2~3바퀴 회전
                    el.stick.style.transform = `rotateY(${yRotation}deg)`;
                });
            }, 50);
            
            // 애니메이션이 끝난 후 결과 표시
            setTimeout(() => {
                const finalResult = results[bellyCount];
                resultText.textContent = finalResult.name;
                resultDescription.textContent = finalResult.description;
                
                throwButton.disabled = false;
                throwButton.textContent = '다시 던지기';
                throwButton.classList.remove('opacity-50', 'cursor-not-allowed');
            }, 1200); // 애니메이션 시간(1s)보다 길게 설정
        }

        throwButton.addEventListener('click', throwYut);
        
        setInitialMessage();
    </script>
</body>
</html>
