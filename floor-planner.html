<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>신혼집 가전·가구 배치 플래너</title>
<style>
  :root{
    --bg:#f4f1ec; --panel:#ffffff; --ink:#2c2a26; --sub:#6b665d;
    --line:#d9d3c7; --accent:#c2703d; --accent2:#8a5a3a;
    --ok:#2e9e5b; --bad:#e0483b; --warn:#e0972f;
    --wall:#3a352e;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:var(--bg);color:var(--ink);
    display:flex;flex-direction:column;height:100dvh;overflow:hidden;
    -webkit-user-select:none;user-select:none;
  }

  /* ---------- Top bar ---------- */
  header{
    flex:0 0 auto;background:var(--panel);border-bottom:1px solid var(--line);
    padding:env(safe-area-inset-top) 10px 0;
  }
  .titlerow{display:flex;align-items:center;gap:8px;padding:8px 2px 6px}
  .titlerow h1{font-size:15px;margin:0;font-weight:700;flex:1;letter-spacing:-.3px}
  #badge{
    font-size:12px;font-weight:700;padding:5px 10px;border-radius:999px;
    background:#eef6f0;color:var(--ok);white-space:nowrap;
  }
  #badge.has-bad{background:#fdecea;color:var(--bad)}

  .toolrow{display:flex;gap:6px;align-items:center;padding:0 0 8px;flex-wrap:wrap}
  .seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{
    border:0;background:var(--panel);color:var(--sub);font-size:12px;font-weight:600;
    padding:7px 11px;min-width:46px;font-family:inherit;
  }
  .seg button.active{background:var(--accent);color:#fff}
  .toolrow .label{font-size:11px;color:var(--sub);margin-right:-2px}
  .ghost{
    border:1px solid var(--line);background:var(--panel);color:var(--ink);
    font-size:12px;font-weight:600;padding:7px 10px;border-radius:9px;font-family:inherit;
  }
  .ghost:active{background:#f0ece4}
  .spacer{flex:1}

  /* ---------- Stage ---------- */
  #stage{flex:1 1 auto;position:relative;overflow:hidden;background:var(--bg)}
  #plan{width:100%;height:100%;display:block;touch-action:none}
  text{user-select:none}

  /* ---------- Detail sheet ---------- */
  #sheet{
    position:absolute;left:0;right:0;bottom:0;transform:translateY(110%);
    transition:transform .22s cubic-bezier(.2,.8,.3,1);
    background:var(--panel);border-top:1px solid var(--line);
    border-radius:16px 16px 0 0;box-shadow:0 -8px 24px rgba(0,0,0,.12);
    padding:10px 14px calc(14px + env(safe-area-inset-bottom));z-index:5;
  }
  #sheet.open{transform:translateY(0)}
  .sheet-grip{width:38px;height:4px;border-radius:3px;background:var(--line);margin:2px auto 10px}
  .sheet-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .sheet-head .nm{font-size:16px;font-weight:700;flex:1}
  .chip{font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px}
  .chip.ok{background:#eef6f0;color:var(--ok)}
  .chip.bad{background:#fdecea;color:var(--bad)}
  .chip.warn{background:#fbf1e0;color:var(--warn)}
  .chip.fixed{background:#eef0f3;color:var(--sub)}
  .meta{font-size:12px;color:var(--sub);margin:2px 0 10px}
  .meta b{color:var(--ink)}
  .dimrow{display:flex;gap:8px;margin-bottom:10px}
  .dimrow .f{flex:1;display:flex;flex-direction:column;gap:3px}
  .dimrow label{font-size:11px;color:var(--sub);font-weight:600}
  .dimrow input{
    width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 8px;
    font-size:15px;font-family:inherit;text-align:center;color:var(--ink);background:#faf7f2;
  }
  .dimrow input:disabled{opacity:.5}
  .dimrow input:focus{outline:2px solid var(--accent);border-color:transparent}
  .actrow{display:flex;gap:8px}
  .actrow button{
    flex:1;border:0;border-radius:10px;padding:11px;font-size:13px;font-weight:700;
    font-family:inherit;background:#f0ece4;color:var(--ink);
  }
  .actrow button.primary{background:var(--accent);color:#fff}
  .actrow button:active{filter:brightness(.95)}
  .note{font-size:11px;color:var(--sub);margin:8px 0 2px;line-height:1.45}

  /* ---------- Toast ---------- */
  #toast{
    position:absolute;left:50%;bottom:18px;transform:translate(-50%,20px);
    background:#2c2a26;color:#fff;font-size:12.5px;font-weight:600;
    padding:9px 15px;border-radius:999px;opacity:0;pointer-events:none;
    transition:.2s;z-index:9;white-space:nowrap;
  }
  #toast.show{opacity:1;transform:translate(-50%,0)}
  .hint{
    position:absolute;left:50%;top:10px;transform:translateX(-50%);
    font-size:11px;color:var(--sub);background:rgba(255,255,255,.85);
    padding:5px 12px;border-radius:999px;pointer-events:none;
  }
</style>
</head>
<body>
<header>
  <div class="titlerow">
    <h1>신혼집 배치 플래너</h1>
    <span id="badge">충돌 0</span>
  </div>
  <div class="toolrow">
    <span class="label">핏체크</span>
    <div class="seg" id="modeSeg">
      <button data-mode="simple">간단</button>
      <button data-mode="standard" class="active">표준</button>
      <button data-mode="strict">엄격</button>
    </div>
    <div class="spacer"></div>
    <button class="ghost" id="shareBtn">공유</button>
    <button class="ghost" id="resetBtn">초기화</button>
  </div>
</header>

<div id="stage">
  <div class="hint" id="hint">물품을 탭하면 치수·배치, 드래그로 이동</div>
  <svg id="plan" xmlns="http://www.w3.org/2000/svg" viewBox="-1250 -1300 14550 14650" preserveAspectRatio="xMidYMid meet"></svg>
  <div id="toast"></div>

  <div id="sheet">
    <div class="sheet-grip"></div>
    <div class="sheet-head">
      <span class="nm" id="sNm">—</span>
      <span class="chip" id="sChip">—</span>
    </div>
    <div class="meta" id="sMeta"></div>
    <div class="dimrow" id="sDims">
      <div class="f"><label>가로 W (mm)</label><input id="iW" type="number" inputmode="numeric" min="1"></div>
      <div class="f"><label>세로 D (mm)</label><input id="iD" type="number" inputmode="numeric" min="1"></div>
      <div class="f"><label>높이 H (mm)</label><input id="iH" type="number" inputmode="numeric" min="1"></div>
    </div>
    <div class="actrow" id="sActs">
      <button id="rotBtn">90° 회전</button>
      <button id="recBtn">권장값</button>
      <button class="primary" id="closeBtn">닫기</button>
    </div>
    <div class="note" id="sNote"></div>
  </div>
</div>

<script>
(function(){
"use strict";

/* =========================================================
   1) 평면도 Ground Truth (단위 mm) — PRD 4장 기반 스키매틱
   좌표계: 원점 좌상단, x→오른쪽, y→아래. 단위 = mm = SVG user unit.
   ========================================================= */
const PLAN_W = 12590, PLAN_H = 12380;

// 방/구역 (벽 안쪽 룸). type 으로 채움색 결정.
const ROOMS = [
  {n:"전실",   x:2500, y:1450, w:1450, h:1450, t:"util"},
  {n:"욕실",   x:2500, y:3050, w:1650, h:2150, t:"bath"},
  {n:"주방 및 식당", x:4835, y:1500, w:3265, h:3935, t:"wood"},
  {n:"발코니", x:4835, y:300,  w:2350, h:1100, t:"tile"},
  {n:"발코니", x:8100, y:300,  w:2890, h:1100, t:"tile"},
  {n:"침실",   x:8100, y:1900, w:2890, h:3535, t:"bed"},   // 안방(마스터)
  {n:"욕실",   x:11000,y:1900, w:1590, h:1635, t:"bath"},
  {n:"드레스룸", x:11000,y:3700, w:1590, h:1735, t:"util"},
  {n:"거실",   x:3490, y:5435, w:4700, h:4945, t:"wood"},
  {n:"드레스룸", x:8100, y:5800, w:1900, h:1045, t:"util"},
  {n:"침실",   x:0,    y:6845, w:3490, h:3535, t:"bed"},   // 좌하단
  {n:"발코니", x:0,    y:10380,w:3490, h:2000, t:"tile"},
  {n:"침실",   x:8190, y:6845, w:4400, h:3535, t:"bed"},   // 우하단
  {n:"발코니", x:8190, y:10380,w:4400, h:1300, t:"tile"},
];
const ROOM_FILL = {wood:"#d7a96e", bed:"#ecdfb4", tile:"#e9e4da", bath:"#dfe6e6", util:"#ece6da"};

// 외곽(십자형) 폴리곤 — 룸 배치를 감싸는 벽선
const OUTLINE = [
  [2400,300],[10990,300],[10990,1900],[12590,1900],[12590,11680],[8190,11680],
  [8190,12380],[0,12380],[0,6845],[2400,6845]
];

// 치수 라벨 (시작점 mm, 길이 mm, 방향, 화면상 위치 오프셋)
const TOPSEG = [["2435",2400],["3265",4835],["2890",8100],["1600",10990]]; // 상부 분절
const BOTSEG = [["3490",0],["4700",3490],["4400",8190]];                    // 하부 분절

/* =========================================================
   2) 배치 물품 (PRD 5장)
   cur.w/cur.d = 현재 footprint(가로/세로, rot=0 기준), x/y = 좌상단 mm, rot = 0/90/180/270
   zone = 핏체크 기준 영역
   ========================================================= */
const ZONES = {
  kitchen : {x:4835, y:1500, w:3265, h:3935, label:"주방"},
  kbalcony: {x:4835, y:300,  w:2350, h:1100, label:"주방측 발코니"},
  master  : {x:8100, y:1900, w:2890, h:3535, label:"안방"},
  dress   : {x:8100, y:5800, w:1900, h:1045, label:"드레스룸"},
  living  : {x:3490, y:5435, w:4700, h:4945, label:"거실"},
  balconyL: {x:0,    y:10380,w:3490, h:2000, label:"발코니/세탁실"},
};

const DEFAULTS = [
  {id:"fridge", name:"냉장고", category:"가전", zone:"kitchen",
   rec:{w:916,d:913,h:1853}, max:{w:1000,d:900,h:2000},
   cur:{w:916,d:913,h:1853,x:4920,y:1600,rot:0}, note:"4도어 권장. 문 앞 여유 700 이상 확보."},
  {id:"tv", name:"TV", category:"가전", zone:"living",
   rec:{w:1930,d:60,h:1110}, max:{w:2200,d:300,h:1260},
   cur:{w:1930,d:60,h:1110,x:4825,y:5500,rot:0}, note:"86″ 벽걸이 기준. TV벽 폭 4700."},
  {id:"washer", name:"세탁건조기", category:"가전", zone:"kbalcony",
   rec:{w:600,d:950,h:980}, max:{w:700,d:1000,h:1050},
   cur:{w:600,d:950,h:980,x:5000,y:430,rot:0}, note:"일체형 드럼. 급·배수 라인 위치 확인."},
  {id:"styler", name:"스타일러", category:"가전", zone:"dress",
   rec:{w:555,d:585,h:1850}, max:{w:690,d:585,h:1850},
   cur:{w:555,d:585,h:1850,x:8230,y:5960,rot:0}, note:"드레스룸/전실 측. 문 열림 방향 확인."},
  {id:"sofa", name:"소파", category:"가구", zone:"living",
   rec:{w:2800,d:1000,h:900}, max:{w:4000,d:1100,h:1000},
   cur:{w:2800,d:1000,h:900,x:4440,y:9050,rot:0}, note:"3.5~4인. TV와 시청거리 확보."},
  {id:"bed", name:"침대", category:"가구", zone:"master",
   rec:{w:1800,d:2000,h:1200}, max:{w:2000,d:2200,h:1200},
   cur:{w:1800,d:2000,h:1200,x:8350,y:2050,rot:0}, note:"LK 기준(높이=헤드보드). 양옆 통로 확보."},
  {id:"tvstand", name:"TV장", category:"가구", zone:"living",
   rec:{w:2000,d:450,h:450}, max:{w:4200,d:450,h:600},
   cur:{w:2000,d:450,h:450,x:4790,y:5640,rot:0}, note:"로우보드. TV벽 하단 배치."},
];

// 고정 마커 (크기 무관 — 계산 제외, 탭 시 안내)
const MARKERS = [
  {id:"dishwasher", name:"식기세척기", zone:"kitchen", x:4900, y:4450, w:600, h:600,
   note:"빌트인 600×600×820. 하부장 폭 600 고정, 6/12인용 선택."},
  {id:"foodwaste", name:"음식물 처리기", zone:"kitchen", x:4920, y:4080, w:320, h:320,
   note:"직배수·소형 300×300×450. 공간 영향 미미."},
  {id:"robot", name:"로봇청소기", zone:"balconyL", x:300, y:10650, w:350, h:450,
   note:"본체 Ø350 / 스테이션 350×450×500. 크기보다 급·배수 배관 위치가 중요."},
];

const CLEARANCE = 600; // 엄격 모드 통로 이격 기본값(상수). 문 앞은 700 권장.

/* =========================================================
   3) 상태
   ========================================================= */
let items = [];
let mode = "standard";       // simple | standard | strict
let selId = null;

function clone(o){return JSON.parse(JSON.stringify(o));}
function makeDefaults(){return DEFAULTS.map(clone);}
function byId(id){return items.find(i=>i.id===id);}

/* footprint: 회전 반영한 화면상 사각형 */
function footprint(it){
  const rot = ((it.cur.rot%360)+360)%360;
  const swap = (rot===90||rot===270);
  return {x:it.cur.x, y:it.cur.y, w:swap?it.cur.d:it.cur.w, h:swap?it.cur.w:it.cur.d};
}
function rectInside(r,z){
  return r.x>=z.x && r.y>=z.y && (r.x+r.w)<=(z.x+z.w) && (r.y+r.h)<=(z.y+z.h);
}
function overlap(a,b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

/* 핏 판정: ok | bad | warn */
function fitStatus(it){
  const f = footprint(it), z = ZONES[it.zone];
  const inZone = rectInside(f,z);
  if(mode==="simple") return inZone ? "ok":"bad";
  const hitItem = items.some(o=>o!==it && overlap(f,footprint(o)));
  if(!inZone || hitItem) return "bad";
  if(mode==="strict"){
    const e={x:f.x-CLEARANCE,y:f.y-CLEARANCE,w:f.w+2*CLEARANCE,h:f.h+2*CLEARANCE};
    const tooClose = items.some(o=>o!==it && overlap(e,footprint(o)));
    if(tooClose) return "warn";
  }
  return "ok";
}
const STATUS_COLOR = {ok:"var(--ok)", bad:"var(--bad)", warn:"var(--warn)"};
const STATUS_KO = {ok:"여유 OK", bad:"충돌", warn:"근접 경고", fixed:"고정"};

/* =========================================================
   4) 렌더링
   ========================================================= */
const svg = document.getElementById("plan");
const SVGNS = "http://www.w3.org/2000/svg";
function el(tag,attrs){const e=document.createElementNS(SVGNS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);return e;}

function renderStatic(){
  // 한 번만 그려도 되는 레이어들 (바닥/외곽/치수/마커는 mode 변화와 무관하지만
  // 마커 색은 고정이므로 함께 그림). 전체 재렌더 단순화를 위해 매번 호출.
  let g = svg.querySelector("#staticLayer");
  if(g) g.remove();
  g = el("g",{id:"staticLayer"});

  // 바깥 배경(외곽 음영)
  g.appendChild(el("polygon",{points:OUTLINE.map(p=>p.join(",")).join(" "),
    fill:"#fbf9f5", stroke:"none"}));

  // 방
  ROOMS.forEach(r=>{
    g.appendChild(el("rect",{x:r.x,y:r.y,width:r.w,height:r.h,rx:20,
      fill:ROOM_FILL[r.t], stroke:"#cdbfa6", "stroke-width":18}));
    const t = el("text",{x:r.x+r.w/2, y:r.y+r.h/2, "text-anchor":"middle",
      "dominant-baseline":"central", "font-size":r.w<1800?210:300,
      fill:"#6e5b41", "font-weight":"700"});
    t.textContent = r.n;
    g.appendChild(t);
  });

  // 외곽 벽선
  g.appendChild(el("polygon",{points:OUTLINE.map(p=>p.join(",")).join(" "),
    fill:"none", stroke:"var(--wall)", "stroke-width":70, "stroke-linejoin":"round"}));

  // 고정 마커
  MARKERS.forEach(m=>{
    const grp = el("g",{"data-id":m.id, style:"cursor:pointer"});
    grp.appendChild(el("rect",{x:m.x,y:m.y,width:m.w,height:m.h,rx:14,
      fill:"#ffffff", stroke:"#9b8e78", "stroke-width":26, "stroke-dasharray":"60 50"}));
    const t=el("text",{x:m.x+m.w/2,y:m.y+m.h/2,"text-anchor":"middle",
      "dominant-baseline":"central","font-size":150,fill:"#7a6f5c","font-weight":"700"});
    t.textContent="◍";
    grp.appendChild(t);
    g.appendChild(grp);
  });

  // 치수 라벨 — 상부/하부/좌측
  drawDimChain(g, TOPSEG.map(s=>+s[0]), 2400, -650, "h");   // 상부 10190
  drawDimChain(g, BOTSEG.map(s=>+s[0]), 0, PLAN_H+780, "h"); // 하부 12590
  drawDimChain(g, [2050,2515,1260,3535,2000], 1450, -780, "v", 0); // 좌측 11360 (start y from top区)

  // 외곽 총치수
  bigDim(g, "12590", PLAN_W/2, PLAN_H+1120);
  bigDim(g, "11360", -980, 6000, true);

  svg.insertBefore(g, svg.firstChild);
}

/* 치수 체인: segs 길이 배열을 시작점부터 이어그림 */
function drawDimChain(g, segs, start, pos, dir, vstart){
  let acc = (dir==="h") ? start : (vstart!==undefined?vstart:start);
  segs.forEach(len=>{
    const a = acc, b = acc+len, mid=(a+b)/2;
    if(dir==="h"){
      g.appendChild(el("line",{x1:a,y1:pos+90,x2:a,y2:pos+250,stroke:"#b3a890","stroke-width":14}));
      g.appendChild(el("line",{x1:b,y1:pos+90,x2:b,y2:pos+250,stroke:"#b3a890","stroke-width":14}));
      g.appendChild(el("line",{x1:a,y1:pos+170,x2:b,y2:pos+170,stroke:"#b3a890","stroke-width":14}));
      const t=el("text",{x:mid,y:pos+120,"text-anchor":"middle","dominant-baseline":"baseline","font-size":190,fill:"#8a7e66"});
      t.textContent=len; g.appendChild(t);
    }else{
      g.appendChild(el("line",{x1:pos+90,y1:a,x2:pos+250,y2:a,stroke:"#b3a890","stroke-width":14}));
      g.appendChild(el("line",{x1:pos+90,y1:b,x2:pos+250,y2:b,stroke:"#b3a890","stroke-width":14}));
      g.appendChild(el("line",{x1:pos+170,y1:a,x2:pos+170,y2:b,stroke:"#b3a890","stroke-width":14}));
      const t=el("text",{x:pos+150,y:mid,"text-anchor":"middle","dominant-baseline":"central","font-size":190,fill:"#8a7e66",transform:`rotate(-90 ${pos+150} ${mid})`});
      t.textContent=len; g.appendChild(t);
    }
    acc=b;
  });
}
function bigDim(g,txt,x,y,vert){
  const t=el("text",{x:x,y:y,"text-anchor":"middle","dominant-baseline":"central","font-size":240,fill:"#6b665d","font-weight":"700"});
  if(vert) t.setAttribute("transform",`rotate(-90 ${x} ${y})`);
  t.textContent=txt; g.appendChild(t);
}

/* 물품 레이어 (상태 변화 시 재렌더) */
function renderItems(){
  let g = svg.querySelector("#itemLayer");
  if(g) g.remove();
  g = el("g",{id:"itemLayer"});

  items.forEach(it=>{
    const f = footprint(it);
    const st = fitStatus(it);
    const col = STATUS_COLOR[st];
    const sel = (it.id===selId);

    // 엄격 모드: 여유공간 점선
    if(mode==="strict"){
      g.appendChild(el("rect",{x:f.x-CLEARANCE,y:f.y-CLEARANCE,
        width:f.w+2*CLEARANCE,height:f.h+2*CLEARANCE,rx:30,
        fill:"none",stroke:col,"stroke-width":18,"stroke-dasharray":"120 90","opacity":.55}));
    }

    const grp = el("g",{"data-id":it.id,style:"cursor:grab"});
    grp.appendChild(el("rect",{x:f.x,y:f.y,width:f.w,height:f.h,rx:24,
      fill:hexFill(it.category, st), stroke:col,
      "stroke-width":sel?90:60}));
    if(sel){
      grp.appendChild(el("rect",{x:f.x-40,y:f.y-40,width:f.w+80,height:f.h+80,rx:34,
        fill:"none",stroke:"var(--accent)","stroke-width":30,"stroke-dasharray":"90 70"}));
    }
    // 라벨
    const fs = Math.max(150, Math.min(300, Math.min(f.w,f.h)*0.42));
    const t=el("text",{x:f.x+f.w/2,y:f.y+f.h/2,"text-anchor":"middle",
      "dominant-baseline":"central","font-size":fs,fill:"#3a3026","font-weight":"700"});
    t.textContent=it.name;
    grp.appendChild(t);
    g.appendChild(grp);
  });
  svg.appendChild(g);
}
function hexFill(cat,st){
  if(st==="bad") return "rgba(224,72,59,.28)";
  if(st==="warn") return "rgba(224,151,47,.30)";
  return cat==="가전" ? "rgba(120,160,200,.40)" : "rgba(150,185,140,.42)";
}

/* =========================================================
   5) 인터랙션 — 드래그/탭 (Pointer Events)
   ========================================================= */
let dragId=null, dragStart=null, dragMoved=false, downPid=null;

function toSvg(evt){
  const pt=svg.createSVGPoint();
  pt.x=evt.clientX; pt.y=evt.clientY;
  return pt.matrixTransform(svg.getScreenCTM().inverse());
}
function mmThreshold(){
  // 8px 화면 이동을 mm로 환산
  const r=svg.getBoundingClientRect();
  return 8 * (svg.viewBox.baseVal.width / r.width);
}

svg.addEventListener("pointerdown", e=>{
  const grp = e.target.closest("[data-id]");
  dragMoved=false; downPid=e.pointerId;
  const p = toSvg(e);
  if(!grp){ dragId="__empty__"; dragStart={px:p.x,py:p.y}; return; } // 빈 곳: 탭이면 선택 해제
  const id = grp.dataset.id;
  dragId=id;
  const it = byId(id);
  dragStart={px:p.x,py:p.y,ix:it?it.cur.x:0,iy:it?it.cur.y:0};
  if(it){ selId=id; renderItems(); }         // 배치 물품 → 선택 + 드래그 가능
  try{svg.setPointerCapture(e.pointerId);}catch(_){}
});
svg.addEventListener("pointermove", e=>{
  if(!dragId) return;
  const it=byId(dragId);          // 마커/빈곳은 undefined → 이동 안 함(임계만 갱신)
  const p=toSvg(e);
  if(it){
    const dx=p.x-dragStart.px, dy=p.y-dragStart.py;
    if(Math.hypot(dx,dy) > mmThreshold()) dragMoved=true;
    it.cur.x = Math.round(dragStart.ix+dx);
    it.cur.y = Math.round(dragStart.iy+dy);
    renderItems();
  }else if(dragStart){
    if(Math.hypot(p.x-dragStart.px,p.y-dragStart.py) > mmThreshold()) dragMoved=true;
  }
});
svg.addEventListener("pointerup", e=>{
  if(!dragId) return;
  try{svg.releasePointerCapture(e.pointerId);}catch(_){}
  const id=dragId; dragId=null;
  if(id==="__empty__"){
    if(!dragMoved){ selId=null; closeSheet(); renderItems(); }
    return;
  }
  const it=byId(id);
  if(it){                                    // 배치 물품
    if(!dragMoved){ openSheet(it.id); }
    else { clampToBounds(it); renderItems(); updateBadge(); syncHash(); }
  }else if(!dragMoved){                       // 고정 마커: 탭 시 안내
    openMarker(id);
  }
});
svg.addEventListener("pointercancel", ()=>{ dragId=null; });

function clampToBounds(it){
  const f=footprint(it);
  const minX=-300, minY=-1000, maxX=PLAN_W+300, maxY=PLAN_H+1500;
  let nx=it.cur.x, ny=it.cur.y;
  if(f.x<minX) nx+= (minX-f.x);
  if(f.y<minY) ny+= (minY-f.y);
  if(f.x+f.w>maxX) nx-=(f.x+f.w-maxX);
  if(f.y+f.h>maxY) ny-=(f.y+f.h-maxY);
  it.cur.x=Math.round(nx); it.cur.y=Math.round(ny);
}

/* =========================================================
   6) 디테일 시트
   ========================================================= */
const sheet=document.getElementById("sheet");
const sNm=document.getElementById("sNm"), sChip=document.getElementById("sChip");
const sMeta=document.getElementById("sMeta"), sNote=document.getElementById("sNote");
const iW=document.getElementById("iW"), iD=document.getElementById("iD"), iH=document.getElementById("iH");
const sDims=document.getElementById("sDims"), sActs=document.getElementById("sActs");

function openSheet(id){
  selId=id; const it=byId(id); if(!it) return;
  renderItems();
  const st=fitStatus(it);
  sNm.textContent=it.name;
  sChip.textContent=STATUS_KO[st];
  sChip.className="chip "+st;
  const z=ZONES[it.zone];
  sMeta.innerHTML=`구분 <b>${it.category}</b> · 배치영역 <b>${z.label}</b> · 권장 <b>${it.rec.w}×${it.rec.d}×${it.rec.h}</b> mm`;
  iW.value=it.cur.w; iD.value=it.cur.d; iH.value=it.cur.h;
  iW.disabled=iD.disabled=iH.disabled=false; // H는 평면 footprint엔 미반영(메타), 입력은 가능
  sDims.style.display="flex"; sActs.style.display="flex";
  sNote.textContent="ℹ︎ "+it.note;
  sheet.classList.add("open");
}
function openMarker(id){
  const m=MARKERS.find(x=>x.id===id); if(!m) return;
  selId=null; renderItems();
  sNm.textContent=m.name+" (고정)";
  sChip.textContent=STATUS_KO.fixed; sChip.className="chip fixed";
  const z=ZONES[m.zone];
  sMeta.innerHTML=`배치영역 <b>${z.label}</b> · 크기 계산 제외 마커`;
  sDims.style.display="none"; sActs.style.display="none";
  sNote.textContent="ℹ︎ "+m.note;
  sheet.classList.add("open");
}
function closeSheet(){ sheet.classList.remove("open"); }

document.getElementById("closeBtn").onclick=()=>{ closeSheet(); selId=null; renderItems(); };
document.getElementById("rotBtn").onclick=()=>{
  const it=byId(selId); if(!it) return;
  it.cur.rot=(it.cur.rot+90)%360;
  clampToBounds(it); refreshSelected();
};
document.getElementById("recBtn").onclick=()=>{
  const it=byId(selId); if(!it) return;
  it.cur.w=it.rec.w; it.cur.d=it.rec.d; it.cur.h=it.rec.h; it.cur.rot=0;
  refreshSelected();
};
function applyDim(){
  const it=byId(selId); if(!it) return;
  const w=parseInt(iW.value,10), d=parseInt(iD.value,10), h=parseInt(iH.value,10);
  if(w>0) it.cur.w=w;
  if(d>0) it.cur.d=d;
  if(h>0) it.cur.h=h;
  refreshSelected(false);
}
iW.addEventListener("input",applyDim);
iD.addEventListener("input",applyDim);
iH.addEventListener("input",applyDim);

function refreshSelected(reopen=true){
  const it=byId(selId);
  clampToBounds(it);
  renderItems(); updateBadge(); syncHash();
  if(it){
    const st=fitStatus(it);
    sChip.textContent=STATUS_KO[st]; sChip.className="chip "+st;
    if(reopen){ iW.value=it.cur.w; iD.value=it.cur.d; iH.value=it.cur.h; }
  }
}

/* =========================================================
   7) 모드 / 배지 / 버튼
   ========================================================= */
const modeSeg=document.getElementById("modeSeg");
modeSeg.addEventListener("click", e=>{
  const b=e.target.closest("button"); if(!b) return;
  mode=b.dataset.mode;
  [...modeSeg.children].forEach(c=>c.classList.toggle("active",c===b));
  renderItems(); updateBadge(); syncHash();
  if(selId){const it=byId(selId);const st=fitStatus(it);sChip.textContent=STATUS_KO[st];sChip.className="chip "+st;}
});

const badge=document.getElementById("badge");
function updateBadge(){
  const total=items.length;
  const bad=items.filter(i=>fitStatus(i)==="bad").length;
  const warn=items.filter(i=>fitStatus(i)==="warn").length;
  badge.classList.toggle("has-bad", bad>0);
  let txt = bad>0 ? `${total}개 중 ${bad}개 충돌` : `충돌 0`;
  if(bad===0 && warn>0) txt=`근접 경고 ${warn}`;
  badge.textContent=txt;
}

document.getElementById("resetBtn").onclick=()=>{
  items=makeDefaults(); selId=null; mode="standard";
  [...modeSeg.children].forEach(c=>c.classList.toggle("active",c.dataset.mode==="standard"));
  closeSheet();
  history.replaceState(null,"",location.pathname+location.search);
  renderStatic(); renderItems(); updateBadge();
  toast("기본 배치로 초기화했어요");
};

document.getElementById("shareBtn").onclick=()=>{
  syncHash();
  const url=location.href;
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(()=>toast("배치 링크를 복사했어요"),
      ()=>toast("주소창의 링크를 복사하세요"));
  }else toast("주소창의 링크를 복사하세요");
};

let toastTimer;
const toastEl=document.getElementById("toast");
function toast(msg){
  toastEl.textContent=msg; toastEl.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toastEl.classList.remove("show"),1900);
}

/* =========================================================
   8) URL 해시 직렬화 (스토리지 API 미사용)
   포맷: #s=<mode>;<id:w,d,h,x,y,rot>|...
   ========================================================= */
function syncHash(){
  const M={simple:"a",standard:"b",strict:"c"}[mode];
  const parts=items.map(i=>`${i.id}:${i.cur.w},${i.cur.d},${i.cur.h},${i.cur.x},${i.cur.y},${i.cur.rot}`);
  const h=`#s=${M};${parts.join("|")}`;
  history.replaceState(null,"",location.pathname+location.search+h);
}
function loadHash(){
  const h=location.hash;
  if(!h.startsWith("#s=")) return false;
  try{
    const body=decodeURIComponent(h.slice(3));
    const [mPart, rest]=body.split(";");
    mode={a:"simple",b:"standard",c:"strict"}[mPart]||"standard";
    (rest||"").split("|").forEach(seg=>{
      const [id,vals]=seg.split(":"); if(!id||!vals) return;
      const it=byId(id); if(!it) return;
      const nums=vals.split(",").map(Number);
      if(nums.some(n=>Number.isNaN(n))) return;
      let w,d,hh,x,y,r;
      if(nums.length>=6){ [w,d,hh,x,y,r]=nums; }
      else { [w,d,x,y,r]=nums; hh=it.cur.h; }   // 구버전 링크 호환(5개)
      it.cur={w,d,h:hh,x,y,rot:((r%360)+360)%360};
    });
    [...modeSeg.children].forEach(c=>c.classList.toggle("active",c.dataset.mode===mode));
    return true;
  }catch(_){return false;}
}

/* =========================================================
   9) 초기화
   ========================================================= */
function init(){
  items=makeDefaults();
  loadHash();
  renderStatic();
  renderItems();
  updateBadge();
  // 힌트 자동 숨김
  setTimeout(()=>{const hn=document.getElementById("hint"); if(hn) hn.style.transition="opacity .6s", hn.style.opacity="0";},3500);
}
window.addEventListener("hashchange",()=>{ /* 외부 링크 변경 무시 */ });
init();
})();
</script>
